<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Landing Page</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav id="navbar">
        <div class="logo">MySite</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <h1>Welcome to My Landing Page</h1>
        <p>Scroll down to see navbar effect</p>
    </section>

    <section id="about" class="section">About Section</section>
    <section id="services" class="section">Services Section</section>

    <!-- CONTACT -->
    <section id="contact" class="section">
        <h2>Contact Us</h2>
        <form id="contactForm">
            <input type="text" placeholder="Name" id="name" required>
            <input type="email" placeholder="Email" id="email" required>
            <textarea placeholder="Message" id="message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
